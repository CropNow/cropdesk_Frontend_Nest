<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Primary Meta Tags -->
    <title>CropDesk | Smart Farming & AI-Driven Crop Management</title>
    <meta
      name="title"
      content="CropDesk | Smart Farming & AI-Driven Crop Management"
    />
    <meta
      name="description"
      content="Revolutionize your farm with CropDesk. Monitor crop health, leverage AI insights, and optimize productivity with our smart farming ecosystem."
    />
    <meta
      name="keywords"
      content="smart farming, precision agriculture, crop management, agri-tech, AG-Tech, IoT farming, AI agriculture, farm productivity"
    />
    <meta name="author" content="CropNow" />
    <meta name="theme-color" content="#166534" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.cropdesk.in/" />
    <meta
      property="og:title"
      content="CropDesk | Smart Farming & AI-Driven Crop Management"
    />
    <meta
      property="og:description"
      content="Optimize your agricultural yield with AI-driven insights and real-time monitoring."
    />
    <meta property="og:image" content="https://www.cropdesk.in/og-image.png" />
    <meta
      property="og:image:alt"
      content="CropDesk Smart Farming Dashboard Preview"
    />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="CropDesk" />

    <meta name="google-site-verification" content="YOUR_TOKEN_HERE" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.cropdesk.in/" />
    <meta name="twitter:title" content="CropDesk | Smart Farming" />
    <meta
      name="twitter:description"
      content="AI-driven crop management and IoT monitoring for the modern farmer."
    />
    <meta name="twitter:image" content="https://www.cropdesk.in/og-image.png" />

    <!-- App & PWA Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="canonical" href="https://www.cropdesk.in/" />

    <!-- Apple Mobile Web App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="CropDesk" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "CropDesk",
        "operatingSystem": "Web",
        "applicationCategory": "AgricultureApplication",
        "description": "Smart farming and AI-driven crop management platform for modern agriculture pulse-check.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "150"
        },
        "publisher": {
          "@type": "Organization",
          "name": "CropDesk",
          "url": "https://www.cropdesk.in"
        }
      }
    </script>
  </head>

  <body class="antialiased">
    <noscript>
      CropDesk requires JavaScript to run properly. Please enable it in your
      browser settings.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
